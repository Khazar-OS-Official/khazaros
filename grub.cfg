insmod part_msdos
insmod part_gpt
insmod iso9660
insmod fat
insmod ext2
insmod all_video
insmod vbe
insmod vga
insmod gfxterm
insmod font

set timeout=10
set default=0

# ─── Real Hardware Fix ───────────────────────────────────────────────
# gfxterm HƏMIŞƏ aktiv olmalıdır - font olsun ya olmasın.
# Əks halda gfxpayload=keep MBI-da framebuffer məlumatı VERMIR (bit12=0).
# Bu real donanımda qara ekranın əsas səbəbidir.

if loadfont /boot/grub/fonts/unicode.pf2 ; then
    true
fi

# gfxmode + gfxterm fontsuz da işləyir (ASCII fallback)
set gfxmode=1024x768x32,800x600x32,640x480x32,auto
terminal_output gfxterm

# Global gfxpayload: kernel boot olmazdan əvvəl də aktiv saxla
set gfxpayload=keep

# ─── Əsas giriş ──────────────────────────────────────────────────────
menuentry "Khazar OS" {
    search --no-floppy --set=root --file /boot/khazar_kernel.bin
    # Menuentry daxilindəki terminal_output gfxterm ZƏRURİDİR.
    # Bəzi UEFI sistemlərdə global ayar reset olunur.
    terminal_output gfxterm
    set gfxpayload=keep
    multiboot /boot/khazar_kernel.bin
    boot
}

# 800x600 - daha geniş uyğunluq (Intel HD 3000 / Sandy Bridge)
menuentry "Khazar OS (800x600)" {
    search --no-floppy --set=root --file /boot/khazar_kernel.bin
    set gfxmode=800x600x32,800x600x24,640x480x32,auto
    terminal_output gfxterm
    set gfxpayload=keep
    multiboot /boot/khazar_kernel.bin
    boot
}

# 640x480 - minimum uyğun mod
menuentry "Khazar OS (640x480 - Min)" {
    search --no-floppy --set=root --file /boot/khazar_kernel.bin
    set gfxmode=640x480x32,640x480x24,640x480x16,auto
    terminal_output gfxterm
    set gfxpayload=keep
    multiboot /boot/khazar_kernel.bin
    boot
}

# Mətn modu - debug üçün (VGA text buffer görünür)
menuentry "Khazar OS (Text Mode - Debug)" {
    search --no-floppy --set=root --file /boot/khazar_kernel.bin
    terminal_output console
    set gfxpayload=text
    multiboot /boot/khazar_kernel.bin
    boot
}
